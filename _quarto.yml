project:
  type: website
  output-dir: docs
  render:
    - "**/*.qmd"

site-url: "https://blade-sp.github.io/personal-website/"

website:
  title: "Riccardo Spada"
  navbar:
    logo: assets/RS_logo_transparent.png

    left:
      - text: Home
        href: index.qmd
      - text: Research
        href: research.qmd
      - text: Dashboards
        href: dashboards.qmd
      - text: Blog
        href: blog.qmd
      - text: CV
        href: cv.qmd

    right:
      - text: "<i class='fa-regular fa-envelope'></i>"
        href: mailto:riccardo.spada@wur.nl
      - text: "<i class='fa-brands fa-linkedin'></i>"
        href: https://www.linkedin.com/in/riccardo-spada
      - text: "<i class='fa-brands fa-github'></i>"
        href: https://github.com/blade-sp
      - text: "<i class='fa-brands fa-orcid'></i>"
        href: https://orcid.org/0009-0001-0364-3402
      - text: "<i class='fa-brands fa-researchgate'></i>"
        href: https://www.researchgate.net/profile/Riccardo-Spada-3
      - text: "<i class='fa-brands fa-google-scholar'></i>"
        href: https://scholar.google.com/citations?user=3i7Aqy8AAAAJ&hl=en


  page-footer:
    left: "<a href='https://github.com/blade-sp/personal-website'><i class='fa-brands fa-github'></i> Source Code</a>"
    center: "© Riccardo Spada 2026"
    right: "Made with <i class='fa-brands fa-r-project'></i> and <a href='https://quarto.org'><span style='color: var(--color-accent);'>Quarto</span></a>"

  favicon: assets/favicon/favicon.ico   

format:
  html:
    theme: cosmo
    css:
      - styles.css
      - _extensions/quarto-ext/fontawesome/assets/css/all.min.css
    smooth-scroll: true
    highlight-style: github
    toc: false
    grid: 
      body-width: 900px